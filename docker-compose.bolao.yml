services:
  bolao-app:
    build:
      context: ./bolao
      dockerfile: Dockerfile
      args:
        # Vite resolve VITE_* em build time — qualquer mudança requer rebuild.
        VITE_API_URL: https://${DOMAIN_NAME_JONE_API}
        # Chave pública VAPID (a privada fica só no backend). Trocar exige rebuild.
        VITE_VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
    container_name: bolao-app
    restart: always
    networks:
      - traefik
    labels:
      - traefik.enable=true
      - traefik.http.routers.bolao.rule=Host(`${DOMAIN_NAME_BOLAO}`)
      - traefik.http.routers.bolao.entrypoints=web,websecure
      - traefik.http.routers.bolao.tls=true
      - traefik.http.services.bolao.loadbalancer.server.port=80

networks:
  traefik:
    external: true
