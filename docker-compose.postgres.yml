services:
  # Postgres compartilhado entre as APIs do backend.
  # Hospeda múltiplos schemas dentro do database `jonepiece`:
  #   - public  → arcos, highlights e config do Jone Piece
  #   - users   → autenticação JWT (compartilhada entre apps)
  #   - bolao   → bolão da Copa 2026 (participantes, palpites, resultados, ranking)
  jonepiece-db:
    image: postgres:16-alpine
    restart: always
    container_name: jonepiece-db
    environment:
      POSTGRES_DB: jonepiece
      POSTGRES_USER: jonepiece
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - jonepiece_pgdata:/var/lib/postgresql/data
    networks:
      - jonepiece_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jonepiece"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  jonepiece_net:
    external: true

volumes:
  jonepiece_pgdata: